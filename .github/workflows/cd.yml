name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Maven 빌드 (테스트 스킵)
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: 환경 분기 설정
        id: env-setup
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "CONFIG_PATH=overlays/dev" >> $GITHUB_OUTPUT
          else
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "CONFIG_PATH=overlays/prod" >> $GITHUB_OUTPUT
          fi

      # 김시현 담당 ─────────────────────────────
      # 여기서부터 작업하세요
      # 3. AWS OIDC 인증
      #    hint: aws-actions/configure-aws-credentials@v4
      #    role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      # 4. ECR 로그인
      #    hint: aws-actions/amazon-ecr-login@v2
      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2
      # 5. Docker 빌드 + push
      #    hint: 태그는 ${{ github.sha }} 사용 (latest 금지!)
      #    ECR 주소: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/team3/foldy
      # ────────────────────────────────────────
      - name: Docker 이미지 빌드 및 ECR Push
        run: |
          IMAGE_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/team3/foldy:${{ github.sha }}"

          docker build -t "$IMAGE_URI" ./Foldy
          docker push "$IMAGE_URI"
      # 김강혁 담당 ─────────────────────────────
      # 6. Config 레포 image tag 갱신
      
      # 커밋 SHA 앞 7자리 추출해서 short 변수에 저장
      - name: Get Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # actions/checkout@v4 로 team3-config 레포 clone
      - name: Checkout team3-config Repository
        uses: actions/checkout@v4
        with:
          repository: 'CLD-05/team3-config'
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: team3-config

      # 러너에 Kustomize가 없을 상황을 대비해 자동 설치
      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # kustomize edit set image 명령어 사용 (갱신 경로 적용)
      - name: Update Image Tag in Kustomize
        run: |
          cd team3-config/${{ steps.env-setup.outputs.CONFIG_PATH }}
          kustomize edit set image foldy-app=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/team3/foldy:${{ github.sha }}

      # 지정된 커밋 메시지 형식으로 team3-config에 자동 Push
      # (동시 배포 충돌 방지를 위해 push 직전 git pull --rebase까지 안전하게 추가)
      - name: Commit and Push to team3-config
        run: |
          cd team3-config
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add ${{ steps.env-setup.outputs.CONFIG_PATH }}/kustomization.yaml
          git commit -m "chore(image): bump app to ${{ steps.sha.outputs.short }} [${{ steps.env-setup.outputs.ENV }}]"
          git pull --rebase origin main
          git push origin main
      # ────────────────────────────────────────

      # 김보경 담당 ─────────────────────────────
      # 여기서부터 작업하세요
      # 7. Slack 배포 알림
      #    hint: 찾아볼 것 "slack github actions notification"
      #    성공/실패 둘 다 알림
      #    if: failure() 조건으로 실패 알림
      # ────────────────────────────────────────
      - name: Slack 알림 - 성공
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text": "배포 성공: ${{ github.repository }} (${{ steps.env-setup.outputs.ENV }})"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 알림 - 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"배포 실패: ${{ github.repository }} (${{ steps.env-setup.outputs.ENV }})"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
