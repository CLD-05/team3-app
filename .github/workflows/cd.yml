name: CD

on:
  workflow_dispatch:
    inputs:
      trigger_message:
        description: '트리거 커밋 메시지'
        required: false
        default: ''

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: team3/foldy
  CONFIG_REPO: CLD-05/team3-config
  CONFIG_REPO_PATH: overlays

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      env_name: ${{ steps.env-setup.outputs.ENV }}
      config_path: ${{ steps.env-setup.outputs.CONFIG_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven 빌드 (테스트 스킵)
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: 이미지 태그 생성
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 환경 분기 설정
        id: env-setup
        run: |
          if [[ "${{ github.ref_name }}" == *-prod ]]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "CONFIG_PATH=overlays/prod" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "CONFIG_PATH=overlays/dev" >> $GITHUB_OUTPUT
          fi

      # ── 김시현 담당 ──────────────────────────
      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 ECR Push
        run: |
          IMAGE_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/team3/foldy:${{ github.sha }}"
          docker build -t "$IMAGE_URI" ./Foldy
          docker push "$IMAGE_URI"
      # ─────────────────────────────────────────

      - name: Slack 알림 - ECR Push 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"❌ ECR Push 실패: ${{ github.repository }} (${{ github.ref_name }})"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  update-config:
    name: Update Config Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # ── 김강혁 담당 ──────────────────────────
      - name: Checkout team3-config Repository
        uses: actions/checkout@v4
        with:
          repository: 'CLD-05/team3-config'
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: team3-config

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update Image Tag in Kustomize
        run: |
          cd team3-config/${{ needs.build-and-push.outputs.config_path }}
          kustomize edit set image foldy-app=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/team3/foldy:${{ github.sha }}

      - name: Commit and Push to team3-config
        run: |
          cd team3-config
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add ${{ needs.build-and-push.outputs.config_path }}/kustomization.yaml
          git diff --staged --quiet || git commit \
            -m "chore(image): bump app to ${{ needs.build-and-push.outputs.image_tag }} [${{ needs.build-and-push.outputs.env_name }}] [skip ci]"
          git pull --rebase origin main
          git push origin main
      # ─────────────────────────────────────────

      # ── 김보경 담당 ──────────────────────────
      - name: Slack 알림 - 성공
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"✅ 배포 성공: ${{ github.repository }} (${{ needs.build-and-push.outputs.env_name }}) - ${{ github.ref_name }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 알림 - 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"❌ 배포 실패: ${{ github.repository }} (${{ needs.build-and-push.outputs.env_name }}) - ${{ github.ref_name }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      # ─────────────────────────────────────────