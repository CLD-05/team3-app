name: CI
on:
  pull_request:
    branches: [main]
permissions:
  id-token: write
  contents: read
jobs:
  # ──────────────────────────────────────────
  # 장민호 담당
  # ──────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Test with Maven
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Foldy/Dockerfile
