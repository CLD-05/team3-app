name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  # 장민호 담당
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Test with Maven
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean verify -DskipTests

      # - name: Lint Dockerfile
      #   uses: hadolint/hadolint-action@v3.1.0
      #   with:
      #     dockerfile: Foldy/Dockerfile
      #     no-fail: true

  trigger-cd:
    name: Trigger CD
    runs-on: ubuntu-latest
    needs: build-and-test
    # main 브랜치 push이고 커밋 메시지가 "version:"으로 시작할 때만
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'version:')
    steps:
      - name: Trigger CD workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CONFIG_REPO_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd.yml',
              ref: 'main',
              inputs: {
                trigger_message: context.payload.head_commit.message
              }
            })