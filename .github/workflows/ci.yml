name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  # 장민호 담당
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Test with Maven
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Foldy/Dockerfile

  auto-tag:
    name: Auto Tag on version commit
    runs-on: ubuntu-latest
    needs: build-and-test
    # main 브랜치 push이고 커밋 메시지가 "version:"으로 시작할 때만
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'version:')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from commit message
        id: extract
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # "version: 1.1" → "v1.1"
          VERSION=$(echo "$MSG" | sed 's/version: //' | tr ' ' '-')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "생성될 태그: v${VERSION}"

      - name: Create and Push Tag
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag ${{ steps.extract.outputs.tag }}
          git push origin ${{ steps.extract.outputs.tag }}
