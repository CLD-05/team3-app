build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    # [변경] version: 게이트 제거 → main push 면 무조건 빌드
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: Foldy/target/

      - name: 이미지 태그 생성
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # [변경] dev/prod 환경 분기 제거 (dev 폐기, prod 단일 운영)

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 ECR Push
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMAGE_URI" ./Foldy
          docker push "$IMAGE_URI"

      - name: Slack 알림 - ECR Push 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"❌ ECR Push 실패: ${{ github.repository }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  update-config:
    name: Update Config Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout team3-config Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: team3-config

      - name: Setup Kustomize
        run: |
          curl -LO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz"
          tar xzf kustomize_v5.3.0_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Update Image Tag in Kustomize
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}"
          # [변경] 항상 prod overlay 갱신 (dev 폐기)
          cd team3-config/overlays/prod
          kustomize edit set image foldy-app=${IMAGE_URI}

      - name: Commit and Push to team3-config
        run: |
          cd team3-config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/prod/kustomization.yaml
          git diff --staged --quiet || git commit \
            -m "chore(image): bump app to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Slack 알림 - 배포 성공
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"✅ 배포 성공: ${{ github.repository }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 알림 - Config 갱신 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"❌ Config 갱신 실패: ${{ github.repository }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
