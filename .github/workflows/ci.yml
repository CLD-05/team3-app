name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: team3/foldy
  CONFIG_REPO: CLD-05/team3-config

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Test with Maven
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean verify -DskipTests

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'version:')
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      env_name: ${{ steps.env-setup.outputs.ENV }}
      config_path: ${{ steps.env-setup.outputs.CONFIG_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven 빌드 (테스트 스킵)
        working-directory: Foldy
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: 이미지 태그 생성
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 환경 분기 설정
        id: env-setup
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" == *-prod ]]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "CONFIG_PATH=overlays/prod" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "CONFIG_PATH=overlays/dev" >> $GITHUB_OUTPUT
          fi

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 ECR Push
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMAGE_URI" ./Foldy
          docker push "$IMAGE_URI"

      - name: Slack 알림 - ECR Push 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"❌ ECR Push 실패: ${{ github.repository }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  update-config:
    name: Update Config Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout team3-config Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: team3-config

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update Image Tag in Kustomize
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}"
          cd team3-config/${{ needs.build-and-push.outputs.config_path }}
          kustomize edit set image foldy-app=${IMAGE_URI}

      - name: Commit and Push to team3-config
        run: |
          cd team3-config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ needs.build-and-push.outputs.config_path }}/kustomization.yaml
          git diff --staged --quiet || git commit \
            -m "chore(image): bump app to ${{ needs.build-and-push.outputs.image_tag }} [${{ needs.build-and-push.outputs.env_name }}] [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Slack 알림 - 배포 성공
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"✅ 배포 성공: ${{ github.repository }} (${{ needs.build-and-push.outputs.env_name }})"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 알림 - Config 갱신 실패
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":"❌ Config 갱신 실패: ${{ github.repository }} (${{ needs.build-and-push.outputs.env_name }})"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK