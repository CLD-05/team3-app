name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────
  # 장민호 담당
  # ──────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 여기서부터 작업하세요 ───────────────────
      # 1. Maven 빌드 + 테스트
      #    hint: ./mvnw clean verify
      # 2. hadolint Dockerfile 검사
      #    hint: 찾아볼 것 "hadolint github action"
      # ────────────────────────────────────────
