<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('메모 목록')}"></head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <!--헤더-->
    <div th:replace="~{fragments/header :: header-back('수학 공부')}"></div>

    <!--콘텐츠-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-3">

            <!--태그 필터-->
            <div class="d-flex gap-2 overflow-auto pb-1" style="white-space: nowrap;">
                <button class="btn btn-sm btn-primary rounded-pill">전체</button>
                <button class="btn btn-sm btn-light rounded-pill">
                    <span class="bullet bullet-dot me-1" style="background-color: #FF6B6B;"></span>
                    수학
                </button>
                <button class="btn btn-sm btn-light rounded-pill">
                    <span class="bullet bullet-dot me-1" style="background-color: #4ECDC4;"></span>
                    공식
                </button>
                <button class="btn btn-sm btn-light rounded-pill">
                    <span class="bullet bullet-dot me-1" style="background-color: #FFE66D;"></span>
                    중요
                </button>
            </div>

            <!--메모 없을 때-->
            <div id="emptyState"
                 class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none">
                <span style="font-size: 48px;">📝</span>
                <span class="fs-5 fw-semibold text-gray-500">메모가 없어요</span>
                <span class="fs-7 text-gray-400">아래 버튼을 눌러 메모를 작성해보세요!</span>
            </div>

            <!--메모 목록-->
            <div id="memoContainer" class="d-flex flex-column gap-3">

                <!--더미 메모 카드-->
                <div class="card shadow-sm" style="cursor: pointer;"
                     onclick="location.href='/publishing/memo/detail'">
                    <div class="card-body py-4">
                        <div class="d-flex flex-column gap-2">
                            <div class="d-flex justify-content-between align-items-start">
                                <span class="fw-bold fs-6 text-gray-800">미적분 기초 정리</span>
                                <span class="fs-9 text-gray-400 ms-2" style="white-space: nowrap;">2026.05.21</span>
                            </div>
                            <p class="fs-7 text-gray-500 mb-0"
                               style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                                극한의 개념부터 시작해서 미분의 정의까지 정리한 내용입니다. 함수의 연속성과...
                            </p>
                            <div class="d-flex gap-2 mt-1">
                                <span class="badge badge-sm rounded-pill"
                                      style="background-color: #FF6B6B20; color: #FF6B6B;">수학</span>
                                <span class="badge badge-sm rounded-pill"
                                      style="background-color: #FFE66D20; color: #B8A000;">중요</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm" style="cursor: pointer;"
                     onclick="location.href='/publishing/memo/detail'">
                    <div class="card-body py-4">
                        <div class="d-flex flex-column gap-2">
                            <div class="d-flex justify-content-between align-items-start">
                                <span class="fw-bold fs-6 text-gray-800">삼각함수 공식 모음</span>
                                <span class="fs-9 text-gray-400 ms-2" style="white-space: nowrap;">2026.05.20</span>
                            </div>
                            <p class="fs-7 text-gray-500 mb-0"
                               style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                                sin, cos, tan 기본 공식과 덧셈 정리, 배각 공식 등을 정리했습니다.
                            </p>
                            <div class="d-flex gap-2 mt-1">
                                <span class="badge badge-sm rounded-pill"
                                      style="background-color: #4ECDC420; color: #2AA198;">공식</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm" style="cursor: pointer;"
                     onclick="location.href='/publishing/memo/detail'">
                    <div class="card-body py-4">
                        <div class="d-flex flex-column gap-2">
                            <div class="d-flex justify-content-between align-items-start">
                                <span class="fw-bold fs-6 text-gray-800">수열과 급수</span>
                                <span class="fs-9 text-gray-400 ms-2" style="white-space: nowrap;">2026.05.19</span>
                            </div>
                            <p class="fs-7 text-gray-500 mb-0"
                               style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                                등차수열, 등비수열 공식 및 수렴 조건 정리
                            </p>
                            <div class="d-flex gap-2 mt-1">
                                <span class="badge badge-sm rounded-pill"
                                      style="background-color: #FF6B6B20; color: #FF6B6B;">수학</span>
                                <span class="badge badge-sm rounded-pill"
                                      style="background-color: #4ECDC420; color: #2AA198;">공식</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!--스크롤 감지용-->
            <div id="scrollAnchor" style="height: 1px;"></div>

        </div>
    </div>

    <!--네비-->
    <div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>

</div>

<!--메모 추가 버튼-->
<a href="/publishing/memo/detail"
   class="btn btn-primary btn-icon w-50px h-50px rounded-circle shadow-lg position-fixed"
   style="bottom: 80px; right: 20px; z-index: 999;">
    <i class="ki-duotone ki-plus fs-2x">
        <span class="path1"></span>
    </i>
</a>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        const [key, val] = c.trim().split('=');
        if (key === 'token') return val;
    }
    return null;
}

if (!getToken()) location.href = '/publishing/login';
</script>

</body>
</html>
