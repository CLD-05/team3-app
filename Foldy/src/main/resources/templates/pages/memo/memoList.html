<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('메모 목록')}"></head>
<body>
<style>
    /* ───── OneNote 스타일 메모 목록 ───── */
    body {
        background: #F4F4F7;
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
    .onenote-page { height: 100vh; }

    /* 상단 섹션 바 */
    .section-bar {
        background: #7719AA;
        color: white;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.2px;
    }
    .section-bar .app-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px; height: 24px;
        background: rgba(255,255,255,0.18);
        border-radius: 4px;
        font-size: 12px;
    }
    .section-bar .section-tab {
        background: rgba(255,255,255,0.15);
        padding: 4px 14px;
        border-radius: 4px 4px 0 0;
        font-size: 12px;
        font-weight: 500;
        margin-left: auto;
        align-self: flex-end;
        position: relative;
        top: 8px;
    }

    /* 페이지 리스트 헤더 */
    .pagelist-header {
        background: #fff;
        border-bottom: 1px solid #E5E5EC;
        padding: 14px 18px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .pagelist-header .back-btn {
        background: none;
        border: none;
        padding: 4px 8px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: #444;
        font-size: 12px;
        font-weight: 500;
    }
    .pagelist-header .back-btn:hover { background: #F0E8F7; color: #7719AA; }
    .pagelist-header .folder-name {
        font-size: 16px;
        font-weight: 700;
        color: #222;
        letter-spacing: -0.3px;
    }
    .pagelist-header .count-badge {
        font-size: 11px;
        color: #7719AA;
        background: #F0E8F7;
        padding: 2px 10px;
        border-radius: 10px;
        font-weight: 600;
    }

    /* 페이지 리스트 */
    .pagelist {
        background: #fff;
    }
    .page-item {
        padding: 14px 18px;
        border-bottom: 1px solid #EFEFF4;
        cursor: pointer;
        position: relative;
        transition: background 0.12s;
    }
    .page-item:hover { background: #FAF6FD; }
    .page-item::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        background: transparent;
        transition: background 0.12s;
    }
    .page-item:hover::before { background: #7719AA; }
    .page-item .row1 {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
    }
    .page-item .page-title {
        font-size: 14.5px;
        font-weight: 600;
        color: #1F1F2E;
        letter-spacing: -0.2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .page-item .page-date {
        font-size: 11px;
        color: #888;
        font-weight: 500;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .page-item .page-preview {
        font-size: 12.5px;
        color: #6A6A7A;
        margin: 5px 0 0;
        line-height: 1.5;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }
    .page-item .tag-row {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
    }
    .page-item .tag-chip {
        font-size: 10.5px;
        padding: 2px 8px;
        border-radius: 3px;
        font-weight: 600;
        border: 1px solid;
    }

    /* 빈 상태 */
    .empty-state {
        padding: 80px 24px;
        text-align: center;
        background: #fff;
    }
    .empty-state .icon {
        font-size: 48px;
        color: #C8C8D4;
        margin-bottom: 14px;
        display: block;
    }
    .empty-state .title {
        font-size: 14px;
        font-weight: 600;
        color: #555;
        margin-bottom: 4px;
    }
    .empty-state .desc { font-size: 12px; color: #888; }

    /* 새 페이지 추가 — 상단 막대 */
    .new-page-btn {
        background: #fff;
        border: none;
        border-bottom: 1px solid #E5E5EC;
        width: 100%;
        padding: 12px 18px;
        text-align: left;
        color: #7719AA;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.12s;
    }
    .new-page-btn:hover { background: #F0E8F7; }
    .new-page-btn .plus {
        width: 18px; height: 18px;
        background: #7719AA;
        color: #fff;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 400;
        line-height: 1;
    }
</style>

<div class="onenote-page d-flex flex-column">

    <!--상단 섹션 바 (OneNote 시그니처)-->
    <div class="section-bar">
        <span class="app-icon">N</span>
        <span>Foldy</span>
        <span class="section-tab" id="sectionTabName">메모</span>
    </div>

    <!--폴더 헤더-->
    <div class="pagelist-header">
        <button class="back-btn" onclick="history.back()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            뒤로
        </button>
        <span class="folder-name" id="folderTitle">메모</span>
        <span class="count-badge" id="memoCount">0</span>
    </div>

    <!--새 페이지 버튼-->
    <a id="btnAddMemo" href="#" class="new-page-btn">
        <span class="plus">+</span>
        새 페이지 추가
    </a>

    <!--콘텐츠-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">

        <!--빈 상태-->
        <div id="emptyState" class="empty-state d-none">
            <span class="icon">📄</span>
            <div class="title">페이지가 없습니다</div>
            <div class="desc">위의 + 버튼으로 새 페이지를 만들어보세요</div>
        </div>

        <!--페이지 리스트-->
        <div id="memoContainer" class="pagelist"></div>

    </div>

    <!--네비-->
    <div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>

</div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
const params = new URLSearchParams(location.search);
const folderId = params.get('folderId');
const folderName = params.get('folderName');

if (folderName) {
    document.getElementById('folderTitle').textContent = folderName;
    document.getElementById('sectionTabName').textContent = folderName;
}

if (!folderId) {
    Swal.fire({
        text: "폴더 정보가 없습니다.",
        icon: "warning", buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-primary" }
    }).then(() => location.href = '/home');
}

document.getElementById('btnAddMemo').href =
    `/memo/detail?folderId=${folderId}` +
    (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');

function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        const [key, val] = c.trim().split('=');
        if (key === 'token') return val;
    }
    return null;
}

function authHeaders() {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers.Authorization = `Bearer ${token}`;
    return headers;
}

function showError(msg) {
    Swal.fire({
        text: msg, icon: "error", buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-danger" }
    });
}

async function loadMemos() {
    try {
        const res = await fetch(`/api/memo?folderId=${folderId}&page=1`, {
            credentials: 'include', headers: authHeaders()
        });
        if (res.status === 401 || res.status === 403) {
            location.href = '/auth/login';
            return;
        }
        const json = await res.json().catch(() => null);
        if (!res.ok || !json?.result) {
            throw new Error(json?.message || '메모 목록을 불러오지 못했습니다.');
        }
        renderMemos(json.data || []);
    } catch (e) {
        showError(e.message);
    }
}

function renderMemos(memos) {
    const container = document.getElementById('memoContainer');
    const emptyState = document.getElementById('emptyState');
    const count = document.getElementById('memoCount');
    container.innerHTML = '';
    count.textContent = memos.length;

    if (!memos.length) {
        emptyState.classList.remove('d-none');
        return;
    }
    emptyState.classList.add('d-none');

    memos.forEach(memo => container.appendChild(buildItem(memo)));
}

function buildItem(memo) {
    const item = document.createElement('div');
    item.className = 'page-item';
    item.onclick = () => {
        const url = `/memo/detail?id=${memo.idxMemo}` +
            (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');
        location.href = url;
    };

    const tagsHtml = (memo.tags || []).map(t => {
        const color = t.color || '#7719AA';
        return `<span class="tag-chip" style="border-color:${color};color:${color};background:${color}0F;">${escapeHtml(t.name)}</span>`;
    }).join('');

    item.innerHTML = `
        <div class="row1">
            <span class="page-title">${escapeHtml(memo.title || '제목 없음')}</span>
            <span class="page-date">${formatDate(memo.updateDate)}</span>
        </div>
        <p class="page-preview">${escapeHtml(memo.contentPreview || '내용 없음')}</p>
        ${tagsHtml ? `<div class="tag-row">${tagsHtml}</div>` : ''}
    `;
    return item;
}

function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}.${mm}.${dd}`;
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

if (folderId) loadMemos();
</script>

</body>
</html>
