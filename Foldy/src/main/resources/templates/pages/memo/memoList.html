<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('메모 목록')}"></head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <div th:replace="~{fragments/header :: header-back('메모 목록')}"></div>

    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-3">

            <!--폴더명 + 메모 개수-->
            <div class="d-flex justify-content-between align-items-center">
                <span id="folderTitle" class="fw-bold fs-5 text-gray-800"></span>
                <span id="memoCount" class="badge badge-light-primary fs-8"></span>
            </div>

            <!--빈 상태-->
            <div id="emptyState"
                 class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none">
                <span style="font-size: 48px;">📝</span>
                <span class="fs-5 fw-semibold text-gray-500">메모가 없어요</span>
                <span class="fs-7 text-gray-400">아래 버튼을 눌러 메모를 작성해보세요!</span>
            </div>

            <!--메모 목록-->
            <div id="memoContainer" class="d-flex flex-column gap-3"></div>

        </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>

</div>

<div th:replace="~{fragments/navbar :: btn-add}"></div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
const params = new URLSearchParams(location.search);
const folderId  = params.get('folderId');
const folderName = params.get('folderName');

if (folderName) document.getElementById('folderTitle').textContent = folderName;

if (!folderId) {
    Swal.fire({
        text: "폴더 정보가 없습니다.", icon: "warning",
        buttonsStyling: false, confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-primary" }
    }).then(() => location.href = '/home');
}

document.getElementById('fabBtn')?.addEventListener('click', function() {
    location.href = `/memo/detail?folderId=${folderId}` +
        (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');
});

function showError(msg) {
    Swal.fire({
        text: msg, icon: "error", buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-danger" }
    });
}

async function loadMemos() {
    try {
        const res = await fetch(`/api/memo?folderId=${folderId}&page=1`, {
            credentials: 'include'
        });
        if (res.status === 401) { location.href = '/auth/login'; return; }
        const json = await res.json();
        if (!json?.result) throw new Error(json?.message || '불러오기 실패');
        renderMemos(json.data || []);
    } catch (e) {
        showError(e.message);
    }
}

function renderMemos(memos) {
    const container  = document.getElementById('memoContainer');
    const emptyState = document.getElementById('emptyState');
    const count      = document.getElementById('memoCount');

    container.innerHTML = '';
    count.textContent = `메모 ${memos.length}개`;

    if (!memos.length) {
        emptyState.classList.remove('d-none');
        return;
    }
    emptyState.classList.add('d-none');
    memos.forEach(memo => container.appendChild(buildCard(memo)));
}

function buildCard(memo) {
    const card = document.createElement('div');
    card.className = 'card shadow-sm';
    card.style.cursor = 'pointer';
    card.onclick = () => {
        location.href = `/memo/detail?id=${memo.idxMemo}` +
            (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');
    };

    const dateStr = memo.updateDate
        ? new Date(memo.updateDate).toLocaleDateString('ko-KR')
        : '';

    const tagsHtml = (memo.tags || []).map(t => {
        const color = t.color || '#4ECDC4';
        return `<span class="badge badge-sm rounded-pill px-3"
                      style="background:${color}20; color:${color}; border:1px solid ${color};">
                    ${escapeHtml(t.name)}
                </span>`;
    }).join('');

    card.innerHTML = `
        <div class="card-body py-4">
            <div class="d-flex flex-column gap-2">
                <div class="d-flex justify-content-between align-items-start">
                    <span class="fw-bold fs-6 text-gray-800">${escapeHtml(memo.title || '제목 없음')}</span>
                    <span class="fs-9 text-gray-400 ms-2" style="white-space: nowrap;">${dateStr}</span>
                </div>
                <p class="fs-7 text-gray-500 mb-0"
                   style="overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">
                    ${escapeHtml(memo.contentPreview || '')}
                </p>
                ${tagsHtml ? `<div class="d-flex gap-2 flex-wrap mt-1">${tagsHtml}</div>` : ''}
            </div>
        </div>
    `;
    return card;
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

if (folderId) loadMemos();
</script>

</body>
</html>
