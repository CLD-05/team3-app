<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('메모')}">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
	rel="stylesheet">
<style>
/* ### 기존 제거하고 이걸로 교체 */
.readonly-mode .ql-editor.ql-blank::before {
    display: none !important;
}
</style>
</head>
<body>
	<div class="d-flex flex-column" style="height: 100vh;">

		<!--헤더-->
		<div class="d-flex flex-column-auto bg-white border-bottom px-4 py-3">
			<div class="d-flex justify-content-between align-items-center w-100">
				<button class="btn btn-sm btn-icon btn-light"
					onclick="history.back()">
					<i class="ki-duotone ki-arrow-left fs-3"> <span class="path1"></span>
						<span class="path2"></span>
					</i>
				</button>
				<span class="fw-bold fs-5 text-gray-900" id="headerTitle">메모</span>
				<div class="d-flex gap-2">
					<button id="btnSave" class="btn btn-sm btn-primary d-none"
						onclick="saveMemo()">저장</button>
					<button id="btnEdit" class="btn btn-sm btn-light d-none"
						onclick="enableEdit()">
						<i class="ki-duotone ki-pencil fs-5"> <span class="path1"></span>
							<span class="path2"></span>
						</i>
					</button>
					<button id="btnDelete"
						class="btn btn-sm btn-icon btn-light-danger d-none"
						onclick="deleteMemo()">
						<i class="ki-duotone ki-trash fs-5"> <span class="path1"></span>
							<span class="path2"></span> <span class="path3"></span> <span
							class="path4"></span> <span class="path5"></span>
						</i>
					</button>
				</div>
			</div>
		</div>

		<!--콘텐츠-->
		<div id="scrollContainer" class="flex-grow-1"
			style="overflow-y: auto;">
			<div class="p-4 w-100 d-flex flex-column gap-4">

				<!--제목-->
				<input type="text" id="memoTitle"
					class="form-control form-control-lg border-0 px-0 fw-bold fs-3"
					placeholder="제목을 입력하세요"
					style="background: transparent; box-shadow: none;" readonly>

				<!--메타 정보-->
				<div class="d-flex flex-column gap-2">
					<div class="d-flex align-items-center gap-2">
						<i class="ki-duotone ki-calendar fs-5 text-gray-400"> <span
							class="path1"></span> <span class="path2"></span>
						</i> <span id="memoDateText" class="fs-7 text-gray-400"></span>
					</div>
					<div class="d-flex align-items-center gap-2 flex-wrap">
						<i class="ki-duotone ki-tag fs-5 text-gray-400"> <span
							class="path1"></span> <span class="path2"></span>
						</i>
						<div id="tagContainer" class="d-flex gap-2 flex-wrap"></div>
						<button id="btnAddTag"
							class="btn btn-sm btn-light rounded-pill d-none"
							onclick="openTagModal()">
							<i class="ki-duotone ki-plus fs-6"> <span class="path1"></span>
							</i> 태그 추가
						</button>
					</div>
				</div>

				<div class="separator"></div>

				<!--Quill 에디터-->
				<div id="quillWrapper">
					<div id="quillEditor" style="min-height: 300px;"></div>
				</div>

				<!--이미지 업로드-->
				<input type="file" id="hiddenImageInput" accept="image/*"
					class="d-none">

			</div>
		</div>

	</div>

	<!--태그 선택 모달-->
	<div class="modal fade" id="tagModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title fw-bold">태그 선택</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body">
					<div id="tagModalList" class="d-flex flex-wrap gap-2">
						<span style="color: #888; font-size: 12px;">불러오는 중...</span>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-light" data-bs-dismiss="modal">취소</button>
					<button type="button" class="btn btn-primary"
						onclick="applyTagSelection()">적용</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
	<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
	<script th:src="@{/js/scripts.bundle.js}"></script>

	<script>
const params     = new URLSearchParams(location.search);
let memoId       = params.get('id');
let folderId     = params.get('folderId');
const folderName = params.get('folderName');

let isEditMode       = false;
let quill            = null;
let allTags          = [];
let selectedTagIds   = [];
let tempSelectedTagIds = [];

// ─────────────────────────────────────────
// Quill 초기화
// ─────────────────────────────────────────
function initQuill() {
    if (quill) return;
    quill = new Quill('#quillEditor', {
        theme: 'snow',
        placeholder: '내용을 입력하세요...',
        modules: {
            toolbar: {
                container: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['link'],
                    ['clean'],
                    ['custom-image']
                ],
                handlers: { 'custom-image': handleImageInsert }
            }
        }
    });
}

function handleImageInsert() {
    const input = document.getElementById('hiddenImageInput');
    input.value = '';
    input.onchange = () => {
        const file = input.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const range = quill.getSelection(true);
            quill.insertEmbed(range.index, 'image', e.target.result, Quill.sources.USER);
            quill.setSelection(range.index + 1);
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

// ─────────────────────────────────────────
// 초기 진입
// ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    initQuill();
    if (memoId) {
        await loadMemo();
    } else {
        if (!folderId) { showError('폴더 정보가 없습니다.'); return; }
        enterCreateMode();
    }
});

async function loadMemo() {
    try {
        const res = await fetch(`/api/memo/${memoId}`, { credentials: 'include' });
        if (res.status === 401) { location.href = '/auth/login'; return; }
        const json = await res.json();
        if (!json?.result) throw new Error(json?.message);
        const memo = json.data;

        folderId = memo.idxFolder;
        selectedTagIds = (memo.tags || []).map(t => t.idxTag);

        document.getElementById('memoTitle').value = memo.title || '';
        document.getElementById('memoDateText').textContent = formatDate(memo.updateDate);
        document.getElementById('headerTitle').textContent = folderName || '메모';
        quill.root.innerHTML = memo.content || '';
        renderTags(memo.tags || []);

        // ### setReadOnly를 마지막에, setTimeout으로 DOM 렌더링 완료 후 실행
        // ### Quill이 내용을 채운 직후 바로 호출하면 ql-blank 클래스가
        // ### 아직 제거되지 않은 상태라 placeholder가 보일 수 있습니다.
        setTimeout(() => setReadOnly(true), 50);

    } catch (e) {
        showError(e.message);
    }
}

function enterCreateMode() {
    document.getElementById('memoDateText').textContent = formatDate(new Date().toISOString());
    document.getElementById('headerTitle').textContent = folderName || '새 메모';
    quill.root.innerHTML = '';
    selectedTagIds = [];
    renderTags([]);
    setReadOnly(false);
}

// ─────────────────────────────────────────
// 모드 전환
// ─────────────────────────────────────────
function setReadOnly(readonly) {
    isEditMode = !readonly;
    quill.enable(!readonly);

    document.getElementById('memoTitle')[readonly ? 'setAttribute' : 'removeAttribute']('readonly', true);
    document.getElementById('btnSave').classList.toggle('d-none', readonly);
    document.getElementById('btnAddTag').classList.toggle('d-none', readonly);

    if (readonly && memoId) {
        document.getElementById('btnEdit').classList.remove('d-none');
        document.getElementById('btnDelete').classList.remove('d-none');
    } else {
        document.getElementById('btnEdit').classList.add('d-none');
        document.getElementById('btnDelete').classList.add('d-none');
    }

    const toolbar   = document.querySelector('.ql-toolbar');
    const container = document.querySelector('.ql-container');
    if (toolbar)   toolbar.style.display = readonly ? 'none' : '';
    if (container) container.style.border = readonly ? 'none' : '';

    // ### placeholder 숨기기/보이기
    // ### 읽기 모드일 때 .ql-blank::before 가 내용 위에 겹쳐 보이는 문제 해결
    const wrapper = document.getElementById('quillWrapper');
	if (readonly) {
	    wrapper.classList.add('readonly-mode');
	} else {
	    wrapper.classList.remove('readonly-mode');
	}
}

function enableEdit() {
    setReadOnly(false);
    document.getElementById('memoTitle').focus();
}

// ─────────────────────────────────────────
// 저장 / 삭제
// ─────────────────────────────────────────
async function saveMemo() {
    const title   = document.getElementById('memoTitle').value.trim();
    const content = quill.root.innerHTML;

    if (!title) { showError("제목을 입력해주세요."); return; }

    try {
        let res, json;
        if (memoId) {
            res  = await fetch(`/api/memo/${memoId}`, {
                method: 'PUT', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, tagIds: selectedTagIds })
            });
        } else {
            res = await fetch('/api/memo', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    idxFolder: Number(folderId), title, content, tagIds: selectedTagIds
                })
            });
        }
        if (res.status === 401) { location.href = '/auth/login'; return; }
        json = await res.json();
        if (!json?.result) throw new Error(json?.message);

        const saved = json.data;
        memoId = saved.idxMemo;
        document.getElementById('memoTitle').value = saved.title || '';
        document.getElementById('memoDateText').textContent = formatDate(saved.updateDate);
        quill.root.innerHTML = saved.content || '';
        selectedTagIds = (saved.tags || []).map(t => t.idxTag);
        renderTags(saved.tags || []);

        history.replaceState(null, '', `/memo/detail?id=${memoId}` +
            (folderName ? `&folderName=${encodeURIComponent(folderName)}` : ''));

        setReadOnly(true);
        Swal.fire({
            text: "저장되었습니다.", icon: "success",
            buttonsStyling: false, confirmButtonText: "확인",
            timer: 1500,
            customClass: { confirmButton: "btn btn-primary" }
        });
    } catch (e) {
        showError(e.message);
    }
}

function deleteMemo() {
    if (!memoId) return;
    Swal.fire({
        text: "메모를 삭제하시겠습니까?", icon: "warning",
        buttonsStyling: false, showCancelButton: true,
        confirmButtonText: "삭제", cancelButtonText: "취소",
        customClass: { confirmButton: "btn btn-danger", cancelButton: "btn btn-light" }
    }).then(async result => {
        if (!result.isConfirmed) return;
        const res = await fetch(`/api/memo/${memoId}`, {
            method: 'DELETE', credentials: 'include'
        });
        const json = await res.json();
        if (json?.result) {
            location.href = `/memo/list?folderId=${folderId}` +
                (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');
        }
    });
}

// ─────────────────────────────────────────
// 태그
// ─────────────────────────────────────────
async function openTagModal() {
    try {
        if (!allTags.length) {
            const res  = await fetch('/api/tags', { credentials: 'include' });
            const json = await res.json();
            allTags = json.data || [];
        }
        tempSelectedTagIds = [...selectedTagIds];
        renderTagModal();
        new bootstrap.Modal(document.getElementById('tagModal')).show();
    } catch (e) {
        showError(e.message);
    }
}

function renderTagModal() {
    const list = document.getElementById('tagModalList');
    list.innerHTML = '';
    if (!allTags.length) {
        list.innerHTML = '<span style="color:#888;font-size:12px;">등록된 태그가 없습니다.</span>';
        return;
    }
    allTags.forEach(tag => {
        const tagId     = getTagId(tag);
        if (!tagId) return;
        const color     = tag.color || '#4ECDC4';
        const isSelected = tempSelectedTagIds.includes(tagId);
        const btn = document.createElement('button');
        btn.className = 'btn btn-sm rounded-pill';
        btn.style.borderColor = color;
        btn.style.color = isSelected ? '#fff' : color;
        btn.style.background = isSelected ? color : `${color}20`;
        btn.style.border = `1px solid ${color}`;
        btn.textContent = tag.name;
        btn.onclick = () => {
            if (tempSelectedTagIds.includes(tagId)) {
                tempSelectedTagIds = tempSelectedTagIds.filter(x => x !== tagId);
            } else {
                tempSelectedTagIds.push(tagId);
            }
            renderTagModal();
        };
        list.appendChild(btn);
    });
}

function applyTagSelection() {
    selectedTagIds = [...tempSelectedTagIds];
    const tagInfos = selectedTagIds
        .map(id => allTags.find(t => getTagId(t) === id))
        .filter(Boolean);
    renderTags(tagInfos);
    bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
}

function renderTags(tags) {
    const container = document.getElementById('tagContainer');
    container.innerHTML = '';
    tags.forEach(t => {
        const color = t.color || '#4ECDC4';
        const span  = document.createElement('span');
        span.className = 'badge badge-sm rounded-pill px-3 py-2 fs-8';
        span.style.background   = `${color}20`;
        span.style.color        = color;
        span.style.border       = `1px solid ${color}`;
        span.textContent = t.name;
        container.appendChild(span);
    });
}

function getTagId(tag) {
    const rawId = tag?.idxTag ?? tag?.tagId ?? tag?.id;
    const tagId = Number(rawId);
    return Number.isFinite(tagId) && tagId > 0 ? tagId : null;
}

// ─────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────
function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function showError(msg) {
    Swal.fire({
        text: msg, icon: "error", buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-danger" }
    });
}
</script>

</body>
</html>
