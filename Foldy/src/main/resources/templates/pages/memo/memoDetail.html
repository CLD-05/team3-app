<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('메모')}">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
<style>
    body {
        background: #fff;
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
    .onenote-page { height: 100vh; }

    /* 상단 섹션 바 */
    .section-bar {
        background: #7719AA;
        color: white;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        font-weight: 600;
    }
    .section-bar .app-icon {
        display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px;
        background: rgba(255,255,255,0.18);
        border-radius: 4px;
        font-size: 12px;
    }
    .section-bar .section-tab {
        background: rgba(255,255,255,0.15);
        padding: 4px 14px;
        border-radius: 4px 4px 0 0;
        font-size: 12px;
        margin-left: auto;
        align-self: flex-end;
        position: relative;
        top: 8px;
    }

    /* 리본 */
    .ribbon {
        background: #FAFAFC;
        border-bottom: 1px solid #E5E5EC;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .ribbon .back-btn {
        background: none; border: none;
        padding: 5px 10px;
        border-radius: 4px;
        color: #444;
        font-size: 12px;
        font-weight: 500;
        display: inline-flex; align-items: center; gap: 4px;
    }
    .ribbon .back-btn:hover { background: #F0E8F7; color: #7719AA; }
    .ribbon .spacer { flex: 1; }
    .ribbon .ribbon-btn {
        background: none; border: 1px solid transparent;
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        color: #444;
        display: inline-flex; align-items: center; gap: 5px;
    }
    .ribbon .ribbon-btn:hover { background: #F0E8F7; color: #7719AA; border-color: #E5DEFB; }
    .ribbon .ribbon-btn.danger:hover { background: #FDECEC; color: #C9302C; border-color: #F5C2C2; }
    .ribbon .btn-save {
        background: #7719AA; color: white;
        border: none;
        padding: 6px 16px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
    }
    .ribbon .btn-save:hover { background: #631489; color: white; }
    .ribbon .status-text {
        font-size: 11px;
        color: #999;
        font-style: italic;
        margin-right: 8px;
    }

    /* 페이지 본문 */
    .page-paper {
        background: #fff;
        padding: 36px 48px 80px;
        max-width: 920px;
        margin: 0 auto;
    }
    .memo-title-input {
        background: transparent;
        border: none;
        outline: none;
        font-size: 30px;
        font-weight: 700;
        color: #1F1F2E;
        width: 100%;
        padding: 4px 0;
        letter-spacing: -0.5px;
        box-shadow: none !important;
        border-bottom: 1.5px solid transparent;
    }
    .memo-title-input::placeholder { color: #C8C8D4; font-weight: 600; }
    .memo-title-input:not([readonly]):focus { border-bottom-color: #7719AA; }
    .memo-title-input[readonly] { border-bottom: none; cursor: default; }

    /* 메타 */
    .meta-bar {
        margin-top: 10px;
        padding-bottom: 14px;
        border-bottom: 1px solid #EFEFF4;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
    }
    .meta-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #777;
    }
    .meta-item svg { color: #999; }
    .tag-list {
        display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    }
    .tag-chip {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 3px;
        font-weight: 600;
        border: 1px solid;
        line-height: 1.4;
    }
    .btn-add-tag {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 3px;
        border: 1px dashed #7719AA;
        background: transparent;
        color: #7719AA;
        font-weight: 600;
        line-height: 1.4;
    }
    .btn-add-tag:hover { background: #F0E8F7; }

    /* Quill 에디터 — 노션 인플레이스 느낌 */
    .quill-wrapper { margin-top: 24px; }
    .ql-toolbar.ql-snow {
        border: 1px solid #E5E5EC !important;
        background: #FAFAFC;
        border-radius: 4px 4px 0 0;
        padding: 6px 10px !important;
        transition: opacity 0.15s, height 0.15s;
    }
    .ql-container.ql-snow {
        border: 1px solid #E5E5EC !important;
        border-top: none !important;
        border-radius: 0 0 4px 4px;
        background: white;
        font-size: 15px;
        font-family: inherit;
        min-height: 320px;
    }
    .ql-editor {
        padding: 22px !important;
        line-height: 1.85;
        color: #2A2A3A;
    }
    .ql-editor img {
        max-width: 100%;
        cursor: pointer;
        border-radius: 4px;
    }

    /* 읽기 모드 — 툴바 숨김 + 테두리 없음 */
    .quill-wrapper.readonly .ql-toolbar.ql-snow {
        display: none !important;
    }
    .quill-wrapper.readonly .ql-container.ql-snow {
        border: none !important;
        border-radius: 0;
    }
    .quill-wrapper.readonly .ql-editor {
        padding: 4px 0 !important;
        background: transparent;
    }
    .quill-wrapper.readonly .ql-editor.ql-blank::before { display: none; }

    /* 커스텀 사진 추가 버튼 (툴바 안) */
    .ql-toolbar .ql-custom-image {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #7719AA !important;
        color: white !important;
        border-radius: 4px !important;
        padding: 3px 10px !important;
        font-size: 11.5px !important;
        font-weight: 600 !important;
        width: auto !important;
        height: auto !important;
        margin-left: 6px;
    }
    .ql-toolbar .ql-custom-image:hover { background: #631489 !important; }
    .ql-toolbar .ql-custom-image::before {
        content: '📷 사진 추가';
    }

    /* 태그 모달 */
    .modal-content {
        border: none;
        border-radius: 6px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .modal-header {
        background: #7719AA; color: white;
        border-bottom: none;
        padding: 12px 18px;
        border-radius: 6px 6px 0 0;
    }
    .modal-title { color: white; font-size: 14px; font-weight: 600; }
    .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 0.7; }
    .modal-body { padding: 18px; }
    .modal-footer { border-top: 1px solid #EFEFF4; padding: 10px 18px; }
    .modal-footer .btn-primary {
        background: #7719AA; border: none;
        font-weight: 600; font-size: 12.5px;
        padding: 6px 18px; border-radius: 4px;
    }
    .modal-footer .btn-primary:hover { background: #631489; }
    .modal-footer .btn-light {
        background: #F0F0F4; border: none;
        color: #555; font-weight: 500; font-size: 12.5px;
        padding: 6px 16px; border-radius: 4px;
    }
    .tag-modal-btn {
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 3px;
        border: 1px solid;
        transition: all 0.12s;
        cursor: pointer;
    }
</style>

<div class="onenote-page d-flex flex-column">

    <!--상단 섹션 바-->
    <div class="section-bar">
        <span class="app-icon">N</span>
        <span>Foldy</span>
        <span class="section-tab" id="sectionTabName">메모</span>
    </div>

    <!--리본-->
    <div class="ribbon">
        <button class="back-btn" onclick="history.back()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            뒤로
        </button>
        <div class="spacer"></div>
        <span id="statusText" class="status-text d-none">편집 중...</span>
        <button id="btnSave" class="btn-save d-none" onclick="saveMemo()">💾 저장</button>
        <button id="btnEdit" class="ribbon-btn d-none" onclick="enableEdit()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                <path d="M16.5 3.5L20.5 7.5L7 21H3V17L16.5 3.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            편집
        </button>
        <button id="btnDelete" class="ribbon-btn danger d-none" onclick="deleteMemo()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                <path d="M3 6H21M8 6V4C8 3 9 2 10 2H14C15 2 16 3 16 4V6M19 6V20C19 21 18 22 17 22H7C6 22 5 21 5 20V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            삭제
        </button>
    </div>

    <!--본문-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="page-paper">

            <input type="text" id="memoTitle" class="memo-title-input"
                   placeholder="제목 없는 페이지" readonly>

            <div class="meta-bar">
                <span class="meta-item">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                        <path d="M3 9H21M8 3V7M16 3V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span id="memoDateText"></span>
                </span>
                <div class="tag-list">
                    <span class="meta-item">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                            <path d="M20.59 13.41L13.42 20.58A2 2 0 0 1 10.59 20.58L2 12V2H12L20.59 10.59A2 2 0 0 1 20.59 13.41Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            <circle cx="7" cy="7" r="1.2" fill="currentColor"/>
                        </svg>
                    </span>
                    <div id="tagContainer" class="d-flex gap-2 flex-wrap"></div>
                    <button id="btnAddTag" class="btn-add-tag d-none" onclick="openTagModal()">+ 태그</button>
                </div>
            </div>

            <!--Quill 에디터 (상시 노출, readOnly 토글)-->
            <div id="quillWrapper" class="quill-wrapper">
                <div id="quillEditor"></div>
            </div>

            <!--숨겨진 파일 input (사진 추가용)-->
            <input type="file" id="hiddenImageInput" accept="image/*" class="d-none">

        </div>
    </div>

</div>

<!--태그 선택 모달-->
<div class="modal fade" id="tagModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">태그 선택</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="tagModalList" class="d-flex flex-wrap gap-2">
                    <span style="color:#888;font-size:12px;">불러오는 중...</span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary" onclick="applyTagSelection()">적용</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<!-- 이미지 리사이즈/이동 모듈 -->
<script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module-withfix@3.0.1/image-resize.min.js"></script>
<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
const params = new URLSearchParams(location.search);
let memoId = params.get('id');
let folderId = params.get('folderId');
const folderName = params.get('folderName');

if (folderName) document.getElementById('sectionTabName').textContent = folderName;

let isEditMode = false;
let quill = null;
let allTags = [];
let selectedTagIds = [];
let tempSelectedTagIds = [];

// ─────────────────────────────────────────
// 인증
// ─────────────────────────────────────────

function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        const [key, val] = c.trim().split('=');
        if (key === 'token') return val;
    }
    return null;
}

function authHeaders(json = true) {
    const token = getToken();
    const headers = {};
    if (json) headers['Content-Type'] = 'application/json';
    if (token) headers.Authorization = `Bearer ${token}`;
    return headers;
}

async function requestJson(url, options = {}, asJson = true) {
    const response = await fetch(url, {
        ...options,
        credentials: 'include',
        headers: { ...authHeaders(asJson), ...(options.headers || {}) }
    });
    if (response.status === 401 || response.status === 403) {
        location.href = '/auth/login';
        throw new Error('인증 필요');
    }
    const result = await response.json().catch(() => null);
    if (!response.ok || !result?.result) {
        throw new Error(result?.message || '요청 처리 중 오류가 발생했습니다.');
    }
    return result.data;
}

function showError(msg) {
    Swal.fire({
        text: msg, icon: "error", buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-danger" }
    });
}

function showInfo(msg) {
    Swal.fire({
        text: msg, icon: "success", buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-primary" },
        timer: 1500
    });
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return `${yyyy}.${mm}.${dd} ${hh}:${mi}`;
}

// ─────────────────────────────────────────
// Quill 초기화 (한 번만)
// ─────────────────────────────────────────

function initQuill() {
    if (quill) return;

    // ImageResize 모듈 등록 (CDN 로드 성공 시)
    if (window.ImageResize) {
        Quill.register('modules/imageResize', window.ImageResize);
    }

    const modules = {
        toolbar: {
            container: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                ['link'],
                ['clean'],
                ['custom-image']  // 커스텀 사진 추가 버튼
            ],
            handlers: {
                'custom-image': handleImageInsert
            }
        }
    };

    if (window.ImageResize) {
        modules.imageResize = {
            displaySize: true,        // 이미지 위에 px 크기 표시
            modules: ['Resize', 'DisplaySize', 'Toolbar']  // 리사이즈 + 크기표시 + 정렬툴바
        };
    }

    quill = new Quill('#quillEditor', {
        theme: 'snow',
        placeholder: '이 곳에 내용을 입력하세요. 텍스트, 사진, 목록 등을 자유롭게 작성할 수 있어요...',
        modules: modules
    });
}

// 툴바의 사진 추가 버튼 핸들러 — 파일 선택 → base64 삽입
function handleImageInsert() {
    const input = document.getElementById('hiddenImageInput');
    input.value = '';
    input.onchange = () => {
        const file = input.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            showError("이미지 파일만 추가할 수 있어요.");
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            const range = quill.getSelection(true);
            quill.insertEmbed(range.index, 'image', e.target.result, Quill.sources.USER);
            quill.setSelection(range.index + 1);
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

// ─────────────────────────────────────────
// 초기 진입
// ─────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
    initQuill();
    if (memoId) {
        await loadMemo();
    } else {
        if (!folderId) {
            showError('폴더 정보가 없습니다.');
            return;
        }
        enterCreateMode();
    }
});

async function loadMemo() {
    try {
        const memo = await requestJson(`/api/memo/${memoId}`);
        folderId = memo.idxFolder;
        selectedTagIds = (memo.tags || []).map(t => t.idxTag);

        document.getElementById('memoTitle').value = memo.title || '';
        document.getElementById('memoDateText').textContent = formatDate(memo.updateDate);
        quill.root.innerHTML = memo.content || '';
        renderTags(memo.tags || []);

        setReadOnly(true);
    } catch (e) {
        showError(e.message);
    }
}

function enterCreateMode() {
    document.getElementById('memoDateText').textContent = formatDate(new Date().toISOString());
    document.getElementById('memoTitle').value = '';
    quill.root.innerHTML = '';
    selectedTagIds = [];
    renderTags([]);
    setReadOnly(false);
}

// ─────────────────────────────────────────
// 모드 전환
// ─────────────────────────────────────────

function setReadOnly(readonly) {
    isEditMode = !readonly;

    const wrapper = document.getElementById('quillWrapper');
    const title = document.getElementById('memoTitle');
    const btnSave = document.getElementById('btnSave');
    const btnEdit = document.getElementById('btnEdit');
    const btnDelete = document.getElementById('btnDelete');
    const btnAddTag = document.getElementById('btnAddTag');
    const status = document.getElementById('statusText');

    quill.enable(!readonly);

    if (readonly) {
        wrapper.classList.add('readonly');
        title.setAttribute('readonly', true);
        btnSave.classList.add('d-none');
        btnAddTag.classList.add('d-none');
        status.classList.add('d-none');
        if (memoId) {
            btnEdit.classList.remove('d-none');
            btnDelete.classList.remove('d-none');
        }
    } else {
        wrapper.classList.remove('readonly');
        title.removeAttribute('readonly');
        btnSave.classList.remove('d-none');
        btnAddTag.classList.remove('d-none');
        status.classList.remove('d-none');
        btnEdit.classList.add('d-none');
        btnDelete.classList.add('d-none');
    }
}

function enableEdit() {
    setReadOnly(false);
    document.getElementById('memoTitle').focus();
}

// ─────────────────────────────────────────
// 저장 / 삭제
// ─────────────────────────────────────────

async function saveMemo() {
    const title = document.getElementById('memoTitle').value.trim();
    const content = quill.root.innerHTML;

    if (!title) {
        showError("제목을 입력해주세요.");
        return;
    }

    try {
        let saved;
        if (memoId) {
            saved = await requestJson(`/api/memo/${memoId}`, {
                method: 'PUT',
                body: JSON.stringify({ title, content, tagIds: selectedTagIds })
            });
        } else {
            saved = await requestJson('/api/memo', {
                method: 'POST',
                body: JSON.stringify({
                    idxFolder: Number(folderId),
                    title, content, tagIds: selectedTagIds
                })
            });
            memoId = saved.idxMemo;
            const newUrl = `/memo/detail?id=${memoId}` +
                (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');
            history.replaceState(null, '', newUrl);
        }

        document.getElementById('memoTitle').value = saved.title || '';
        document.getElementById('memoDateText').textContent = formatDate(saved.updateDate);
        quill.root.innerHTML = saved.content || '';
        selectedTagIds = (saved.tags || []).map(t => t.idxTag);
        renderTags(saved.tags || []);

        setReadOnly(true);
        showInfo("저장되었습니다.");
    } catch (e) {
        showError(e.message);
    }
}

function deleteMemo() {
    if (!memoId) return;
    Swal.fire({
        text: "메모를 삭제하시겠습니까?",
        icon: "warning", buttonsStyling: false,
        showCancelButton: true,
        confirmButtonText: "삭제", cancelButtonText: "취소",
        customClass: { confirmButton: "btn btn-danger", cancelButton: "btn btn-light" }
    }).then(async result => {
        if (!result.isConfirmed) return;
        try {
            await requestJson(`/api/memo/${memoId}`, { method: 'DELETE' });
            const listUrl = `/memo/list?folderId=${folderId}` +
                (folderName ? `&folderName=${encodeURIComponent(folderName)}` : '');
            location.href = listUrl;
        } catch (e) {
            showError(e.message);
        }
    });
}

// ─────────────────────────────────────────
// 태그
// ─────────────────────────────────────────

async function openTagModal() {
    try {
        if (!allTags.length) {
            allTags = await requestJson('/api/tags') || [];
        }
        tempSelectedTagIds = [...selectedTagIds];
        renderTagModal();
        new bootstrap.Modal(document.getElementById('tagModal')).show();
    } catch (e) {
        showError(e.message);
    }
}

function renderTagModal() {
    const list = document.getElementById('tagModalList');
    list.innerHTML = '';
    if (!allTags.length) {
        list.innerHTML = '<span style="color:#888;font-size:12px;">등록된 태그가 없습니다.</span>';
        return;
    }
    allTags.forEach(tag => {
        const tagId = tag.idxTag ?? tag.id;
        const name = tag.name;
        const color = tag.color || '#7719AA';
        const isSelected = tempSelectedTagIds.includes(tagId);

        const btn = document.createElement('button');
        btn.className = 'tag-modal-btn';
        if (isSelected) {
            btn.style.background = color;
            btn.style.color = '#fff';
            btn.style.borderColor = color;
        } else {
            btn.style.background = `${color}0F`;
            btn.style.color = color;
            btn.style.borderColor = color;
        }
        btn.textContent = name;
        btn.onclick = () => {
            if (tempSelectedTagIds.includes(tagId)) {
                tempSelectedTagIds = tempSelectedTagIds.filter(x => x !== tagId);
            } else {
                tempSelectedTagIds.push(tagId);
            }
            renderTagModal();
        };
        list.appendChild(btn);
    });
}

function applyTagSelection() {
    selectedTagIds = [...tempSelectedTagIds];
    const tagInfos = selectedTagIds
        .map(id => allTags.find(t => (t.idxTag ?? t.id) === id))
        .filter(Boolean)
        .map(t => ({ idxTag: t.idxTag ?? t.id, name: t.name, color: t.color }));
    renderTags(tagInfos);
    bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
}

function renderTags(tags) {
    const container = document.getElementById('tagContainer');
    container.innerHTML = '';
    tags.forEach(t => {
        const color = t.color || '#7719AA';
        const span = document.createElement('span');
        span.className = 'tag-chip';
        span.style.borderColor = color;
        span.style.color = color;
        span.style.background = `${color}0F`;
        span.textContent = t.name;
        container.appendChild(span);
    });
}
</script>

</body>
