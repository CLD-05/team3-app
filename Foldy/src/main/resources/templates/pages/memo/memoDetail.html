<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('메모')}">
    <!-- Quill 에디터 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <!--헤더-->
    <div class="d-flex flex-column-auto bg-white border-bottom px-4 py-3">
        <div class="d-flex justify-content-between align-items-center w-100">
            <button class="btn btn-sm btn-icon btn-light" onclick="history.back()">
                <i class="ki-duotone ki-arrow-left fs-3">
                    <span class="path1"></span>
                    <span class="path2"></span>
                </i>
            </button>
            <div class="d-flex gap-2">
                <!--저장 버튼 (편집 모드일 때만 보임)-->
                <button id="btnSave" class="btn btn-sm btn-primary d-none"
                        onclick="saveMemo()">저장</button>
                <!--편집 버튼-->
                <button id="btnEdit" class="btn btn-sm btn-light"
                        onclick="enableEdit()">
                    <i class="ki-duotone ki-pencil fs-5">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                </button>
                <!--삭제 버튼-->
                <button class="btn btn-sm btn-icon btn-light-danger"
                        onclick="deleteMemo()">
                    <i class="ki-duotone ki-trash fs-5">
                        <span class="path1"></span>
                        <span class="path2"></span>
                        <span class="path3"></span>
                        <span class="path4"></span>
                        <span class="path5"></span>
                    </i>
                </button>
            </div>
        </div>
    </div>

    <!--콘텐츠-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-4">

            <!--제목-->
            <input type="text" id="memoTitle"
                   class="form-control form-control-lg border-0 px-0 fw-bold fs-3"
                   placeholder="제목을 입력하세요"
                   style="background: transparent; box-shadow: none;"
                   value="미적분 기초 정리"
                   readonly>

            <!--메타 정보 (날짜 + 태그)-->
            <div class="d-flex flex-column gap-2">

                <!--날짜-->
                <div class="d-flex align-items-center gap-2">
                    <i class="ki-duotone ki-calendar fs-5 text-gray-400">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                    <span class="fs-7 text-gray-400">2026.05.21</span>
                </div>

                <!--태그 목록-->
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <i class="ki-duotone ki-tag fs-5 text-gray-400">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                    <div id="tagContainer" class="d-flex gap-2 flex-wrap">
                        <span class="badge badge-sm rounded-pill"
                              style="background-color: #FF6B6B20; color: #FF6B6B;">수학</span>
                        <span class="badge badge-sm rounded-pill"
                              style="background-color: #FFE66D20; color: #B8A000;">중요</span>
                    </div>
                    <!--태그 추가 버튼 (편집 모드)-->
                    <button id="btnAddTag"
                            class="btn btn-sm btn-light rounded-pill d-none"
                            onclick="openTagModal()">
                        <i class="ki-duotone ki-plus fs-6">
                            <span class="path1"></span>
                        </i>
                        태그 추가
                    </button>
                </div>

            </div>

            <div class="separator"></div>

            <!--에디터-->
            <div id="editorContainer">
                <!--읽기 모드-->
                <div id="viewMode" class="fs-6 text-gray-700 lh-lg">
                    <p>극한의 개념부터 시작해서 미분의 정의까지 정리한 내용입니다.</p>
                    <p><strong>1. 극한의 정의</strong></p>
                    <p>lim(x→a) f(x) = L 이면, x가 a에 한없이 가까워질 때 f(x)는 L에 수렴한다.</p>
                    <p><strong>2. 미분의 정의</strong></p>
                    <p>f'(x) = lim(h→0) [f(x+h) - f(x)] / h</p>
                </div>
                <!--편집 모드 (Quill)-->
                <div id="editMode" class="d-none">
                    <div id="quillEditor" style="min-height: 300px;"></div>
                </div>
            </div>

            <!--이미지 업로드 (편집 모드)-->
            <div id="imageUploadArea" class="d-none">
                <div class="separator mb-4"></div>
                <label class="d-flex align-items-center gap-2 text-gray-500"
                       style="cursor: pointer;">
                    <i class="ki-duotone ki-picture fs-4">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                    <span class="fs-7">이미지 추가</span>
                    <input type="file" id="imageInput" accept="image/*"
                           class="d-none" onchange="uploadImage(this)">
                </label>
            </div>

            <!--이미지 미리보기-->
            <div id="imagePreview" class="d-flex flex-column gap-3">
                <img src="https://picsum.photos/400/200"
                     class="rounded w-100" style="object-fit: cover; max-height: 200px;">
            </div>

        </div>
    </div>

</div>

<!--태그 선택 모달-->
<div class="modal fade" id="tagModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">태그 선택</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-sm rounded-pill"
                            style="background-color: #FF6B6B20; color: #FF6B6B;"
                            onclick="selectTag(this, '수학')">수학</button>
                    <button class="btn btn-sm rounded-pill"
                            style="background-color: #4ECDC420; color: #2AA198;"
                            onclick="selectTag(this, '공식')">공식</button>
                    <button class="btn btn-sm rounded-pill"
                            style="background-color: #FFE66D20; color: #B8A000;"
                            onclick="selectTag(this, '중요')">중요</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light"
                        data-bs-dismiss="modal">닫기</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        const [key, val] = c.trim().split('=');
        if (key === 'token') return val;
    }
    return null;
}

if (!getToken()) location.href = '/publishing/login';

let quill = null;
let isEditMode = false;

// 편집 모드 활성화
function enableEdit() {
    isEditMode = true;

    // 제목 수정 가능
    document.getElementById('memoTitle').removeAttribute('readonly');
    document.getElementById('memoTitle').focus();

    // 버튼 전환
    document.getElementById('btnEdit').classList.add('d-none');
    document.getElementById('btnSave').classList.remove('d-none');

    // 태그 추가 버튼
    document.getElementById('btnAddTag').classList.remove('d-none');

    // 에디터 전환
    document.getElementById('viewMode').classList.add('d-none');
    document.getElementById('editMode').classList.remove('d-none');
    document.getElementById('imageUploadArea').classList.remove('d-none');

    // Quill 초기화
    if (!quill) {
        quill = new Quill('#quillEditor', {
            theme: 'snow',
            placeholder: '내용을 입력하세요...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link'],
                    ['clean']
                ]
            }
        });
    }

    // 기존 내용 로드
    const viewContent = document.getElementById('viewMode').innerHTML;
    quill.root.innerHTML = viewContent;
}

// 저장
function saveMemo() {
    const title = document.getElementById('memoTitle').value;
    const content = quill ? quill.root.innerHTML : '';

    if (!title) {
        Swal.fire({
            text: "제목을 입력해주세요.",
            icon: "warning",
            buttonsStyling: false,
            confirmButtonText: "확인",
            customClass: { confirmButton: "btn btn-primary" }
        });
        return;
    }

    // 읽기 모드로 전환
    document.getElementById('viewMode').innerHTML = content;
    document.getElementById('viewMode').classList.remove('d-none');
    document.getElementById('editMode').classList.add('d-none');
    document.getElementById('imageUploadArea').classList.add('d-none');
    document.getElementById('btnSave').classList.add('d-none');
    document.getElementById('btnEdit').classList.remove('d-none');
    document.getElementById('btnAddTag').classList.add('d-none');
    document.getElementById('memoTitle').setAttribute('readonly', true);

    isEditMode = false;

    // API 연결 시 구현
}

// 삭제
function deleteMemo() {
    Swal.fire({
        text: "메모를 삭제하시겠습니까?",
        icon: "warning",
        buttonsStyling: false,
        showCancelButton: true,
        confirmButtonText: "삭제",
        cancelButtonText: "취소",
        customClass: {
            confirmButton: "btn btn-danger",
            cancelButton: "btn btn-light"
        }
    }).then(result => {
        if (result.isConfirmed) {
            // API 연결 시 구현
            location.href = '/publishing/memo/list';
        }
    });
}

// 태그 모달
function openTagModal() {
    new bootstrap.Modal(document.getElementById('tagModal')).show();
}

function selectTag(btn, tagName) {
    bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
    // API 연결 시 구현
}

// 이미지 업로드
function uploadImage(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const preview = document.getElementById('imagePreview');
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'rounded w-100';
        img.style.cssText = 'object-fit: cover; max-height: 200px;';
        preview.appendChild(img);
    };
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
