<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('태그')}"></head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <!--헤더-->
    <div th:replace="~{fragments/header :: header-main}"></div>

    <!--콘텐츠-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-4">

            <!--태그 없을 때-->
            <div id="emptyState"
                 class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none">
                <span style="font-size: 48px;">🏷️</span>
                <span class="fs-5 fw-semibold text-gray-500">태그가 없어요</span>
                <span class="fs-7 text-gray-400">아래 버튼을 눌러 태그를 만들어보세요!</span>
            </div>

            <!--태그 목록-->
            <div id="tagContainer" class="d-flex flex-column gap-3">
            </div>
        </div>
    </div>

    <!--네비-->
    <div th:replace="~{fragments/navbar :: navbar-main('tag')}"></div>

</div>

<!--태그 추가 버튼-->
<button onclick="openAddTag()"
        class="btn btn-primary btn-icon w-50px h-50px rounded-circle shadow-lg position-fixed"
        style="bottom: 80px; right: 20px; z-index: 999;">
    <i class="ki-duotone ki-plus fs-2x">
        <span class="path1"></span>
    </i>
</button>

<!--태그 생성/수정 모달-->
<div class="modal fade" id="tagModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="tagModalTitle">새 태그</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body d-flex flex-column gap-4">

                <!--태그 이름-->
                <div>
                    <label class="form-label fw-semibold text-gray-700">태그 이름</label>
                    <input type="text" id="tagName"
                           class="form-control form-control-lg"
                           placeholder="태그 이름을 입력하세요">
                </div>

                <!--색상 선택-->
                <div>
                    <label class="form-label fw-semibold text-gray-700">색상</label>
                    <div class="d-flex gap-3 flex-wrap mt-2">
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #FF6B6B; cursor: pointer;"
                             onclick="selectColor(this, '#FF6B6B')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #4ECDC4; cursor: pointer;"
                             onclick="selectColor(this, '#4ECDC4')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #FFE66D; cursor: pointer;"
                             onclick="selectColor(this, '#FFE66D')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #A8E6CF; cursor: pointer;"
                             onclick="selectColor(this, '#A8E6CF')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #DDA0DD; cursor: pointer;"
                             onclick="selectColor(this, '#DDA0DD')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #87CEEB; cursor: pointer;"
                             onclick="selectColor(this, '#87CEEB')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #F0A500; cursor: pointer;"
                             onclick="selectColor(this, '#F0A500')"></div>
                        <div class="color-option w-30px h-30px rounded-circle"
                             style="background-color: #FF8C69; cursor: pointer;"
                             onclick="selectColor(this, '#FF8C69')"></div>
                    </div>
                </div>

                <!--미리보기-->
                <div>
                    <label class="form-label fw-semibold text-gray-700">미리보기</label>
                    <div class="mt-1">
                        <span id="tagPreview"
                              class="badge badge-sm rounded-pill px-3 py-2 fs-7"
                              style="background-color: #FF6B6B20; color: #FF6B6B;">
                            태그 이름
                        </span>
                    </div>
                </div>

            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light"
                        data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary"
                        onclick="saveTag()">저장</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        const [key, val] = c.trim().split('=');
        if (key === 'token') return val;
    }
    return null;
}

// if (!getToken()) location.href = '/auth/login';

let selectedColor = '#FF6B6B';
let editTagId = null;

// 태그 이름 입력 시 미리보기 업데이트
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('tagName').addEventListener('input', function() {
        const preview = document.getElementById('tagPreview');
        preview.textContent = this.value || '태그 이름';
    });
    loadTags();
});

function authHeaders() {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers.Authorization = `Bearer ${token}`;
    return headers;
}

async function requestJson(url, options = {}) {
    const response = await fetch(url, {
        ...options,
        headers: {
            ...authHeaders(),
            ...(options.headers || {})
        }
    });

    const result = await response.json().catch(() => null);
    if (!response.ok || !result?.result) {
        throw new Error(result?.message || '요청 처리 중 오류가 발생했습니다.');
    }
    return result.data;
}

async function loadTags() {
    try {
        const tags = await requestJson('/api/tags');
        renderTags(tags || []);
    } catch (e) {
        showError(e.message);
    }
}

function renderTags(tags) {
    const container = document.getElementById('tagContainer');
    const emptyState = document.getElementById('emptyState');
    container.innerHTML = '';

    if (!tags.length) {
        emptyState.classList.remove('d-none');
        return;
    }

    emptyState.classList.add('d-none');
    tags.forEach(tag => container.appendChild(createTagCard(tag)));
}

function createTagCard(tag) {
    const card = document.createElement('div');
    card.className = 'card shadow-sm';

    const color = normalizeColor(tag.color);
    card.innerHTML = `
        <div class="card-body py-3">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="w-15px h-15px rounded-circle" style="background-color: ${color};"></div>
                    <span class="fw-semibold fs-6 text-gray-800">${escapeHtml(tag.name)}</span>
                    <span class="fs-8 text-gray-400">메모 ${Number(tag.memoCount || 0)}개</span>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-icon btn-light btn-edit-tag">
                        <i class="ki-duotone ki-pencil fs-5">
                            <span class="path1"></span>
                            <span class="path2"></span>
                        </i>
                    </button>
                    <button type="button" class="btn btn-sm btn-icon btn-light-danger btn-delete-tag">
                        <i class="ki-duotone ki-trash fs-5">
                            <span class="path1"></span>
                            <span class="path2"></span>
                            <span class="path3"></span>
                            <span class="path4"></span>
                            <span class="path5"></span>
                        </i>
                    </button>
                </div>
            </div>
        </div>
    `;

    card.querySelector('.btn-edit-tag').addEventListener('click', () => {
        openEditTag(tag.tagId, tag.name, color);
    });
    card.querySelector('.btn-delete-tag').addEventListener('click', () => {
        deleteTag(tag.tagId);
    });

    return card;
}

function selectColor(el, color) {
    selectedColor = color;

    // 선택 표시
    document.querySelectorAll('.color-option').forEach(c => {
        c.style.outline = 'none';
    });
    el.style.outline = `3px solid ${color}`;
    el.style.outlineOffset = '2px';

    // 미리보기 업데이트
    const preview = document.getElementById('tagPreview');
    preview.style.backgroundColor = color + '20';
    preview.style.color = color;
}

function markSelectedColor(color) {
    document.querySelectorAll('.color-option').forEach(c => {
        c.style.outline = 'none';
        if (rgbToHex(c.style.backgroundColor).toUpperCase() === color.toUpperCase()) {
            c.style.outline = `3px solid ${color}`;
            c.style.outlineOffset = '2px';
        }
    });
}

function openAddTag() {
    editTagId = null;
    document.getElementById('tagModalTitle').textContent = '새 태그';
    document.getElementById('tagName').value = '';
    selectColor(document.querySelector('.color-option'), '#FF6B6B');
    new bootstrap.Modal(document.getElementById('tagModal')).show();
}

function openEditTag(id, name, color) {
    editTagId = id;
    document.getElementById('tagModalTitle').textContent = '태그 수정';
    document.getElementById('tagName').value = name;
    selectedColor = color;
    markSelectedColor(color);
    document.getElementById('tagPreview').textContent = name;
    document.getElementById('tagPreview').style.backgroundColor = color + '20';
    document.getElementById('tagPreview').style.color = color;
    new bootstrap.Modal(document.getElementById('tagModal')).show();
}

async function saveTag() {
    const name = document.getElementById('tagName').value.trim();
    if (!name) {
        Swal.fire({
            text: "태그 이름을 입력해주세요.",
            icon: "warning",
            buttonsStyling: false,
            confirmButtonText: "확인",
            customClass: { confirmButton: "btn btn-primary" }
        });
        return;
    }

    const method = editTagId ? 'PATCH' : 'POST';
    const url = editTagId ? `/api/tags/${editTagId}` : '/api/tags';

    try {
        await requestJson(url, {
            method,
            body: JSON.stringify({ name, color: selectedColor })
        });
        bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
        await loadTags();
    } catch (e) {
        showError(e.message);
    }
}

function deleteTag(id) {
    Swal.fire({
        text: "태그를 삭제하시겠습니까?",
        icon: "warning",
        buttonsStyling: false,
        showCancelButton: true,
        confirmButtonText: "삭제",
        cancelButtonText: "취소",
        customClass: {
            confirmButton: "btn btn-danger",
            cancelButton: "btn btn-light"
        }
    }).then(result => {
        if (result.isConfirmed) {
            requestJson(`/api/tags/${id}`, { method: 'DELETE' })
                .then(() => loadTags())
                .catch(e => showError(e.message));
        }
    });
}

function showError(message) {
    Swal.fire({
        text: message,
        icon: "error",
        buttonsStyling: false,
        confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-primary" }
    });
}

function escapeHtml(value) {
    return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

function normalizeColor(color) {
    return /^#[0-9A-Fa-f]{6}$/.test(color || '') ? color : '#4ECDC4';
}

function rgbToHex(value) {
    if (!value.startsWith('rgb')) return value;
    const rgb = value.match(/\d+/g).map(Number);
    return '#' + rgb.slice(0, 3).map(v => v.toString(16).padStart(2, '0')).join('');
}
</script>

</body>
</html>
