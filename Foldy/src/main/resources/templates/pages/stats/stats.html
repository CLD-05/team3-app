<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('통계')}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <!--헤더-->
    <div th:replace="~{fragments/header :: header-main}"></div>

    <!--콘텐츠-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-4">

            <!--요약 카드 3개-->
            <div class="d-flex gap-3">
                <div class="card shadow-sm flex-grow-1">
                    <div class="card-body py-4 text-center">
                        <span class="fs-2x fw-bolder text-primary">12</span>
                        <div class="fs-8 text-gray-500 mt-1">전체 메모</div>
                    </div>
                </div>
                <div class="card shadow-sm flex-grow-1">
                    <div class="card-body py-4 text-center">
                        <span class="fs-2x fw-bolder text-success">3</span>
                        <div class="fs-8 text-gray-500 mt-1">전체 폴더</div>
                    </div>
                </div>
                <div class="card shadow-sm flex-grow-1">
                    <div class="card-body py-4 text-center">
                        <span class="fs-2x fw-bolder text-warning">5</span>
                        <div class="fs-8 text-gray-500 mt-1">전체 태그</div>
                    </div>
                </div>
            </div>

            <!--이번 주 활동-->
            <div class="card shadow-sm">
                <div class="card-header">
                    <h3 class="card-title fs-6 fw-bold">📅 이번 주 메모 활동</h3>
                </div>
                <div class="card-body">
                    <canvas id="weeklyChart" height="150"></canvas>
                </div>
            </div>

            <!--태그별 메모 분포-->
            <div class="card shadow-sm">
                <div class="card-header">
                    <h3 class="card-title fs-6 fw-bold">🏷️ 태그별 메모 분포</h3>
                </div>
                <div class="card-body d-flex justify-content-center">
                    <div style="width: 250px; height: 250px;">
                        <canvas id="tagChart"></canvas>
                    </div>
                </div>
                <!--범례-->
                <div class="card-body pt-0">
                    <div class="d-flex flex-column gap-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-2">
                                <div class="w-10px h-10px rounded-circle"
                                     style="background-color: #FF6B6B;"></div>
                                <span class="fs-7 text-gray-700">수학</span>
                            </div>
                            <span class="fs-7 fw-semibold text-gray-800">5개 (42%)</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-2">
                                <div class="w-10px h-10px rounded-circle"
                                     style="background-color: #4ECDC4;"></div>
                                <span class="fs-7 text-gray-700">공식</span>
                            </div>
                            <span class="fs-7 fw-semibold text-gray-800">3개 (25%)</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-2">
                                <div class="w-10px h-10px rounded-circle"
                                     style="background-color: #FFE66D;"></div>
                                <span class="fs-7 text-gray-700">중요</span>
                            </div>
                            <span class="fs-7 fw-semibold text-gray-800">4개 (33%)</span>
                        </div>
                    </div>
                </div>
            </div>

            <!--폴더별 메모 개수-->
            <div class="card shadow-sm">
                <div class="card-header">
                    <h3 class="card-title fs-6 fw-bold">📁 폴더별 메모 개수</h3>
                </div>
                <div class="card-body">
                    <canvas id="folderChart" height="150"></canvas>
                </div>
            </div>

            <!--최근 활동-->
            <div class="card shadow-sm">
                <div class="card-header">
                    <h3 class="card-title fs-6 fw-bold">⏱️ 최근 활동</h3>
                </div>
                <div class="card-body d-flex flex-column gap-3">

                    <div class="d-flex align-items-center gap-3">
                        <div class="w-8px h-8px rounded-circle bg-primary"></div>
                        <div class="d-flex flex-column flex-grow-1">
                            <span class="fs-7 fw-semibold text-gray-800">미적분 기초 정리</span>
                            <span class="fs-9 text-gray-400">수학 폴더 · 방금 전</span>
                        </div>
                    </div>

                    <div class="d-flex align-items-center gap-3">
                        <div class="w-8px h-8px rounded-circle bg-success"></div>
                        <div class="d-flex flex-column flex-grow-1">
                            <span class="fs-7 fw-semibold text-gray-800">삼각함수 공식 모음</span>
                            <span class="fs-9 text-gray-400">수학 폴더 · 1시간 전</span>
                        </div>
                    </div>

                    <div class="d-flex align-items-center gap-3">
                        <div class="w-8px h-8px rounded-circle bg-warning"></div>
                        <div class="d-flex flex-column flex-grow-1">
                            <span class="fs-7 fw-semibold text-gray-800">영어 불규칙 동사</span>
                            <span class="fs-9 text-gray-400">영어 폴더 · 어제</span>
                        </div>
                    </div>

                    <div class="d-flex align-items-center gap-3">
                        <div class="w-8px h-8px rounded-circle bg-info"></div>
                        <div class="d-flex flex-column flex-grow-1">
                            <span class="fs-7 fw-semibold text-gray-800">물리 역학 정리</span>
                            <span class="fs-9 text-gray-400">과학 폴더 · 2일 전</span>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!--네비-->
    <div th:replace="~{fragments/navbar :: navbar-main('stats')}"></div>

</div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        const [key, val] = c.trim().split('=');
        if (key === 'token') return val;
    }
    return null;
}

if (!getToken()) location.href = '/publishing/login';

document.addEventListener('DOMContentLoaded', function() {

    // 이번 주 메모 활동 (막대 차트)
    new Chart(document.getElementById('weeklyChart'), {
        type: 'bar',
        data: {
            labels: ['월', '화', '수', '목', '금', '토', '일'],
            datasets: [{
                label: '메모 수',
                data: [2, 4, 1, 3, 5, 2, 0],
                backgroundColor: '#009EF720',
                borderColor: '#009EF7',
                borderWidth: 2,
                borderRadius: 6,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 },
                    grid: { color: '#F4F4F4' }
                },
                x: { grid: { display: false } }
            }
        }
    });

    // 태그별 분포 (도넛 차트)
    new Chart(document.getElementById('tagChart'), {
        type: 'doughnut',
        data: {
            labels: ['수학', '공식', '중요'],
            datasets: [{
                data: [5, 3, 4],
                backgroundColor: ['#FF6B6B', '#4ECDC4', '#FFE66D'],
                borderWidth: 0,
            }]
        },
        options: {
            responsive: true,
            cutout: '65%',
            plugins: { legend: { display: false } }
        }
    });

    // 폴더별 메모 개수 (가로 막대 차트)
    new Chart(document.getElementById('folderChart'), {
        type: 'bar',
        data: {
            labels: ['수학 공부', '영어 단어', '과학 정리'],
            datasets: [{
                data: [5, 3, 4],
                backgroundColor: ['#FF6B6B20', '#4ECDC420', '#FFE66D20'],
                borderColor: ['#FF6B6B', '#4ECDC4', '#FFE66D'],
                borderWidth: 2,
                borderRadius: 6,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 },
                    grid: { color: '#F4F4F4' }
                },
                y: { grid: { display: false } }
            }
        }
    });

});
</script>

</body>
</html>
