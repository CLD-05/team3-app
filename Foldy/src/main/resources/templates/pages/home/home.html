<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('홈')}"></head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <!--헤더-->
    <div th:replace="~{fragments/header :: header-main}"></div>

    <!--콘텐츠-->
    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-3">

            <!--검색창-->
            <div class="input-group">
                <span class="input-group-text bg-light border-0">
                    <i class="ki-duotone ki-magnifier fs-4 text-gray-500">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                </span>
                <input type="text" id="searchInput"
                       class="form-control bg-light border-0"
                       placeholder="메모 검색">
            </div>

            <!--폴더 없을 때-->
            <div id="emptyState"
                 class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none">
                <span style="font-size: 48px;">📂</span>
                <span class="fs-5 fw-semibold text-gray-500">폴더가 없어요</span>
                <span class="fs-7 text-gray-400">아래 버튼을 눌러 폴더를 만들어보세요!</span>
            </div>

            <!--폴더 목록-->
            <div id="folderContainer" class="d-flex flex-column gap-3">

                <!--더미 폴더 카드 (퍼블리싱용)-->
                <div class="card shadow-sm" style="cursor: pointer;"
                     onclick="location.href='/publishing/memo/list'">
                    <div class="card-body py-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <span style="font-size: 24px;">📁</span>
                                <div class="d-flex flex-column">
                                    <span class="fw-bold fs-6 text-gray-800">수학 공부</span>
                                    <span class="fs-8 text-gray-400 mt-1">메모 5개</span>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-icon btn-light"
                                        onclick="event.stopPropagation(); openEditFolder(1, '수학 공부')">
                                    <i class="ki-duotone ki-pencil fs-5">
                                        <span class="path1"></span>
                                        <span class="path2"></span>
                                    </i>
                                </button>
                                <button class="btn btn-sm btn-icon btn-light-danger"
                                        onclick="event.stopPropagation(); deleteFolder(1)">
                                    <i class="ki-duotone ki-trash fs-5">
                                        <span class="path1"></span>
                                        <span class="path2"></span>
                                        <span class="path3"></span>
                                        <span class="path4"></span>
                                        <span class="path5"></span>
                                    </i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm" style="cursor: pointer;"
                     onclick="location.href='/publishing/memo/list'">
                    <div class="card-body py-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <span style="font-size: 24px;">📁</span>
                                <div class="d-flex flex-column">
                                    <span class="fw-bold fs-6 text-gray-800">영어 단어</span>
                                    <span class="fs-8 text-gray-400 mt-1">메모 3개</span>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-icon btn-light"
                                        onclick="event.stopPropagation(); openEditFolder(2, '영어 단어')">
                                    <i class="ki-duotone ki-pencil fs-5">
                                        <span class="path1"></span>
                                        <span class="path2"></span>
                                    </i>
                                </button>
                                <button class="btn btn-sm btn-icon btn-light-danger"
                                        onclick="event.stopPropagation(); deleteFolder(2)">
                                    <i class="ki-duotone ki-trash fs-5">
                                        <span class="path1"></span>
                                        <span class="path2"></span>
                                        <span class="path3"></span>
                                        <span class="path4"></span>
                                        <span class="path5"></span>
                                    </i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!--네비-->
    <div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>

</div>

<!--폴더 추가 버튼-->
<div th:replace="~{fragments/navbar :: btn-add('#')}"></div>

<!--폴더 생성 모달-->
<div class="modal fade" id="folderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="folderModalTitle">새 폴더</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="folderName"
                       class="form-control form-control-lg"
                       placeholder="폴더 이름을 입력하세요">
            </div>
            <div class="modal-footer">
                <button type="button"
                        class="btn btn-light"
                        data-bs-dismiss="modal">취소</button>
                <button type="button"
                        class="btn btn-primary"
                        onclick="saveFolder()">저장</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
function getToken() {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        // trim()을 각각의 key와 val에 확실히 먹여서 앞뒤 공백을 완벽히 제거합니다.
        const [key, val] = c.split('=');
        if (key && key.trim() === 'token') return val ? val.trim() : null;
    }
    return null;
}

// 디버깅용: 현재 토큰을 정상적으로 인식하는지 콘솔에 찍어봅니다.
console.log("현재 읽어온 토큰:", getToken());

// 💡 개발/퍼블리싱 단계에서 자꾸 튕기는 게 불편하다면 
// 임시로 아래 한 줄을 지우거나 주석(//) 처리해 두는 것을 가장 추천합니다!
//if (!getToken()) {
//    console.warn("토큰이 없어서 로그인 페이지로 튕깁니다.");
//   location.href = '/publishing/login';
//}

// 플러스 버튼 → 모달 열기
document.querySelector('.btn-add-trigger')?.addEventListener('click', () => {
    document.getElementById('folderModalTitle').textContent = '새 폴더';
    document.getElementById('folderName').value = '';
    new bootstrap.Modal(document.getElementById('folderModal')).show();
});

let editFolderId = null;

function openEditFolder(id, name) {
    editFolderId = id;
    document.getElementById('folderModalTitle').textContent = '폴더 수정';
    document.getElementById('folderName').value = name;
    new bootstrap.Modal(document.getElementById('folderModal')).show();
}

function saveFolder() {
    const name = document.getElementById('folderName').value;
    if (!name) {
        Swal.fire({
            text: "폴더 이름을 입력해주세요.",
            icon: "warning",
            buttonsStyling: false,
            confirmButtonText: "확인",
            customClass: { confirmButton: "btn btn-primary" }
        });
        return;
    }
    // API 연결 시 구현
    bootstrap.Modal.getInstance(document.getElementById('folderModal')).hide();
}

function deleteFolder(id) {
    Swal.fire({
        text: "폴더를 삭제하면 안의 메모도 모두 삭제됩니다.",
        icon: "warning",
        buttonsStyling: false,
        showCancelButton: true,
        confirmButtonText: "삭제",
        cancelButtonText: "취소",
        customClass: {
            confirmButton: "btn btn-danger",
            cancelButton: "btn btn-light"
        }
    }).then(result => {
        if (result.isConfirmed) {
            // API 연결 시 구현
        }
    });
}
</script>

</body>
</html>
