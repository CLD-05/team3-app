<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('홈')}"></head>
<body>
<div class="d-flex flex-column" style="height: 100vh;">

    <div th:replace="~{fragments/header :: header-main}"></div>

    <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
        <div class="p-4 w-100 d-flex flex-column gap-3">

            <div class="input-group shadow-sm rounded">
                <span class="input-group-text bg-light border-0">
                    <i class="ki-duotone ki-magnifier fs-4 text-gray-500">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                </span>
                <input type="text" id="searchInput"
                       class="form-control bg-light border-0"
                       placeholder="폴더 이름을 실시간 검색하거나, 엔터를 눌러 메모 내용을 검색해보세요!">
                <button class="btn btn-primary" type="button"
                        onclick="executeMemoSearch()">내용 검색</button>
            </div>

            <div id="memoSearchSection" class="d-none mt-2">
                <div class="d-flex justify-content-between align-items-center border-bottom border-2 border-primary pb-2 mb-3">
                    <h5 class="fw-bold text-primary mb-0">📝 메모 내용 검색 결과</h5>
                    <button type="button" class="btn btn-sm btn-light fw-semibold"
                            onclick="closeMemoSearch()">결과 닫기</button>
                </div>
                <div id="memoSearchResultList" class="d-flex flex-column gap-3"></div>
            </div>

            <hr id="searchDivider" class="d-none my-2">

            <div id="emptyState"
                 class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none">
                <span style="font-size: 48px;">📂</span>
                <span class="fs-5 fw-semibold text-gray-500">폴더가 없어요</span>
                <span class="fs-7 text-gray-400">아래 버튼을 눌러 폴더를 만들어보세요!</span>
            </div>

            <div id="folderContainer" class="d-flex flex-column gap-3"></div>

        </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>

</div>

<div th:replace="~{fragments/navbar :: btn-add}"></div>

<div class="modal fade" id="folderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-dark" id="folderModalTitle">새 폴더 생성</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="form-label fw-semibold text-gray-700">폴더 이름</label>
                <input type="text" id="folderNameInput"
                       class="form-control form-control-lg"
                       placeholder="생성할 폴더 이름을 입력하세요">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary fw-bold"
                        onclick="saveFolder()">폴더 저장하기</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>

<script>
let editFolderId = null;
let myModalInstance = null;

document.addEventListener("DOMContentLoaded", function () {
    myModalInstance = new bootstrap.Modal(document.getElementById('folderModal'));
    loadFoldersList();

    document.getElementById('fabBtn')?.addEventListener('click', function () {
        editFolderId = null;
        document.getElementById('folderModalTitle').textContent = '새 폴더 생성';
        document.getElementById('folderNameInput').value = '';
        myModalInstance.show();
    });

    document.getElementById('searchInput')?.addEventListener('keyup', function (e) {
        if (e.key === 'Enter') executeMemoSearch();
    });
});

function saveFolder() {
    const name = document.getElementById('folderNameInput').value.trim();
    if (!name) return;

    const url    = editFolderId ? `/api/folders/${editFolderId}` : '/api/folders';
    const method = editFolderId ? 'PUT' : 'POST';

    fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name })
    })
    .then(res => res.json())
    .then(res => {
        if (res.result) {
            myModalInstance.hide();
            Swal.fire({
                text: editFolderId ? "폴더가 수정되었습니다." : "폴더가 생성되었습니다.",
                icon: "success", buttonsStyling: false,
                confirmButtonText: "확인",
                customClass: { confirmButton: "btn btn-primary" }
            }).then(() => loadFoldersList());
        } else {
            Swal.fire({
                text: res.message || "서버 오류가 발생했습니다.",
                icon: "error", buttonsStyling: false,
                confirmButtonText: "확인",
                customClass: { confirmButton: "btn btn-danger" }
            });
        }
    })
    .catch(err => console.error(err));
}

function loadFoldersList() {
    fetch('/api/folders', { credentials: 'include' })
    .then(res => {
        if (res.status === 401) { location.href = '/auth/login'; return; }
        return res.json();
    })
    .then(response => {
        if (!response) return;
        const list       = response.data || [];
        const container  = document.getElementById('folderContainer');
        const emptyState = document.getElementById('emptyState');

        container.innerHTML = '';

        if (list.length === 0) {
            emptyState.classList.remove('d-none');
            return;
        }
        emptyState.classList.add('d-none');

        list.forEach(folder => {
            const dateStr = folder.createDate ? folder.createDate.substring(0, 10) : '';
            const cardHtml = `
                <div class="card shadow-sm folder-card"
                     style="cursor: pointer;"
                     data-name="${folder.name}"
                     onclick="location.href='/memo/list?folderId=${folder.idxFolder}&folderName=${encodeURIComponent(folder.name)}'">
                    <div class="card-body py-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <span style="font-size: 24px;">📁</span>
                                <div class="d-flex flex-column">
                                    <span class="fw-bold fs-6 text-gray-800">${folder.name}</span>
                                    <span class="fs-8 text-gray-400 mt-1">${dateStr}</span>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-icon btn-light"
                                        onclick="event.stopPropagation(); openEditFolder(${folder.idxFolder}, '${folder.name}')">
                                    <i class="ki-duotone ki-pencil fs-5">
                                        <span class="path1"></span><span class="path2"></span>
                                    </i>
                                </button>
                                <button class="btn btn-sm btn-icon btn-light-danger"
                                        onclick="event.stopPropagation(); deleteFolder(${folder.idxFolder})">
                                    <i class="ki-duotone ki-trash fs-5">
                                        <span class="path1"></span><span class="path2"></span>
                                        <span class="path3"></span><span class="path4"></span>
                                        <span class="path5"></span>
                                    </i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHtml);
        });
    })
    .catch(err => console.error("리스트 로드 에러:", err));
}

function openEditFolder(id, name) {
    editFolderId = id;
    document.getElementById('folderModalTitle').textContent = '폴더 수정';
    document.getElementById('folderNameInput').value = name;
    myModalInstance.show();
}

// (수정)
function deleteFolder(id) {
    Swal.fire({
    	text: "정말 이 폴더를 삭제하시겠습니까?",
        icon: "question", buttonsStyling: false,
        showCancelButton: true,
        confirmButtonText: "삭제", cancelButtonText: "취소",
        customClass: { confirmButton: "btn btn-danger", cancelButton: "btn btn-light" }
    }).then(result => {
        if (result.isConfirmed) {
            fetch(`/api/folders/${id}`, { method: 'DELETE', credentials: 'include' })
            .then(res => {if (res.status === 500) throw new Error("서버 에러");
            return res.json();
            })
            .then(res => {
                if (res.result) {
                    Swal.fire({
                        text: "폴더가 성공적으로 삭제되었습니다.", icon: "success",
                        buttonsStyling: false, confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-primary" }
                    }).then(() => loadFoldersList());
                }
                // 백엔드에서 실패(false)를 반환한 경우 (추가)
                else {
                    Swal.fire({
                        title: "삭제 불가",
                        text: res.message || "폴더 안에 메모가 존재하여 삭제할 수 없습니다. 메모를 먼저 삭제하거나 이동해 주세요.", 
                        icon: "error",
                        buttonsStyling: false, 
                        confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-secondary" }
                    });
                }
            })
            // 💡 네트워크 오류나 백엔드 서버가 다운되었을 때를 위한 안전장치 (추가)
            .catch(err => {
                Swal.fire({
                    text: "서버와 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.",
                    icon: "error",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-danger" }
                });
            });
        }
    });
}

document.getElementById('searchInput')?.addEventListener('input', function (e) {
    const keyword = e.target.value.toLowerCase();
    document.querySelectorAll('.folder-card').forEach(card => {
        card.classList.toggle('d-none',
            !card.getAttribute('data-name').toLowerCase().includes(keyword));
    });
});

function executeMemoSearch() {
    const keywordInput = document.getElementById("searchInput");
    const keyword = keywordInput.value.trim();

    if (!keyword) {
        Swal.fire({
            text: "검색할 메모 내용을 입력해 주세요.", icon: "warning",
            buttonsStyling: false, confirmButtonText: "확인",
            customClass: { confirmButton: "btn btn-primary" }
        });
        keywordInput.focus();
        return;
    }

    fetch(`/api/memo/search?keyword=${encodeURIComponent(keyword)}`, {
        credentials: 'include'
    })
    .then(res => {
        if (res.status === 401) { location.href = '/auth/login'; return; }
        return res.json();
    })
    .then(res => {
        if (!res) return;
        if (res.data) {
            renderMemoSearchResults(res.data);
        } else {
            Swal.fire({
                text: res.message || "검색 결과를 처리할 수 없습니다.",
                icon: "warning", buttonsStyling: false,
                confirmButtonText: "확인",
                customClass: { confirmButton: "btn btn-primary" }
            });
        }
    })
    .catch(err => console.error(err));
}

function renderMemoSearchResults(memos) {
    const searchSection  = document.getElementById("memoSearchSection");
    const resultContainer = document.getElementById("memoSearchResultList");
    const divider        = document.getElementById("searchDivider");

    resultContainer.innerHTML = "";

    if (!memos || memos.length === 0) {
        resultContainer.innerHTML = `
            <div class="text-center py-5 bg-light rounded border">
                <span class="fs-6 text-gray-500">🔍 입력하신 키워드가 담긴 메모를 찾지 못했어요.</span>
            </div>`;
    } else {
        memos.forEach(memo => {
            const date    = memo.updateDate ? new Date(memo.updateDate) : new Date();
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
            resultContainer.insertAdjacentHTML('beforeend', `
                <div class="card shadow-sm border-start border-4 border-primary"
                     style="cursor: pointer;"
                     onclick="location.href='/memo/detail?id=${memo.idxMemo}'">
                    <div class="card-body py-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="d-flex flex-column gap-1 w-100">
                                <span class="fw-bold fs-6 text-gray-900">📌 ${memo.title || '제목 없는 메모'}</span>
                                <p class="fs-7 text-gray-600 mb-0 mt-1">${memo.contentPreview || ''}</p>
                            </div>
                            <span class="badge bg-light text-gray-500 fs-9 ms-2">${dateStr}</span>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    searchSection.classList.remove("d-none");
    divider.classList.remove("d-none");
}

function closeMemoSearch() {
    document.getElementById("memoSearchSection").classList.add("d-none");
    document.getElementById("searchDivider").classList.add("d-none");
    document.getElementById("searchInput").value = "";
}
</script>
</body>
</html>
